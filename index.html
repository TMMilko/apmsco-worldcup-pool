<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>APMSCO Worldcup Pool</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Hanken+Grotesk:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap');

:root{
  --bg:#07140e; --bg2:#0b2017; --panel:rgba(255,255,255,.045); --panel2:rgba(255,255,255,.025);
  --line:rgba(255,255,255,.09); --green:#35e27c; --gold:#f5c542; --coral:#ff5e52;
  --text:#eef5ef; --muted:#8fa99a;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{font-family:'Hanken Grotesk',system-ui,sans-serif;color:var(--text);min-height:100vh;
  background:radial-gradient(1200px 600px at 50% -10%, var(--bg2) 0%, var(--bg) 55%);}
.lines{position:fixed;inset:0;pointer-events:none;opacity:.5;
  background:repeating-linear-gradient(0deg,rgba(255,255,255,.018) 0 1px,transparent 1px 46px);}
.wrap{position:relative;}
.disp{font-family:'Anton',sans-serif;letter-spacing:.5px;text-transform:uppercase;}
.mono{font-family:'Space Mono',monospace;}
.col{max-width:720px;margin:0 auto;}
h1,h2{margin:0;}
::placeholder{color:#5d7468;}
a{color:var(--green);}
input,textarea,button{font-family:inherit;}
.in{width:100%;padding:11px 12px;border-radius:10px;font-size:15px;background:var(--bg2);
  border:1px solid var(--line);color:var(--text);outline:none;}
.in:focus{border-color:var(--green);}
textarea.in{resize:vertical;line-height:1.5;}
select.in{height:44px;-webkit-appearance:none;appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);background-position:calc(100% - 16px) 19px,calc(100% - 11px) 19px;background-size:5px 5px,5px 5px;background-repeat:no-repeat;padding-right:32px;}
select.in option{background:var(--bg2);color:var(--text);}
.lbl{font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600;}
.field{display:block;margin-bottom:14px;}
.hint{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.4;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn{cursor:pointer;border-radius:11px;font-weight:700;font-size:14px;padding:11px 16px;
  border:1px solid transparent;transition:transform .08s,filter .2s,background .2s;}
.btn:active{transform:scale(.97);}
.btn[disabled]{opacity:.5;cursor:default;}
.btn-primary{background:var(--green);color:#04140b;}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--line);}
.btn-danger{color:var(--coral);border:1px solid rgba(255,94,82,.34);background:transparent;}
.card{border:1px solid var(--line);background:var(--panel);border-radius:14px;padding:12px 14px;
  margin-bottom:10px;transition:border-color .2s,background .2s;}
.sect{font-size:18px;margin:16px 2px 8px;}
.header{border-bottom:1px solid var(--line);background:rgba(7,20,14,.7);backdrop-filter:blur(8px);
  position:sticky;top:0;z-index:20;}
.header .col{padding:14px 16px;display:flex;align-items:center;gap:12px;}
.tabs{padding:12px 16px 4px;display:flex;gap:8px;}
.tab{flex:1;padding:10px 5px;border-radius:12px;cursor:pointer;font-weight:700;font-size:13px;
  border:1px solid var(--line);background:var(--panel2);color:var(--muted);transition:.2s;}
.tab.active{border-color:var(--green);background:rgba(53,226,124,.12);color:var(--green);}
.matchrow{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;}
.team{font-weight:700;font-size:16px;}
.scorein{width:44px;text-align:center;font-size:20px;padding:6px 0;border-radius:9px;
  background:var(--bg2);border:1px solid var(--line);color:var(--text);outline:none;font-family:'Space Mono',monospace;}
.scorein.filled{border-color:var(--green);}
.scorein::-webkit-outer-spin-button,.scorein::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.pill{min-width:34px;text-align:center;padding:5px 8px;border:1px solid var(--line);border-radius:9px;}
.chip{font-size:11px;font-weight:800;letter-spacing:1px;border-radius:6px;padding:2px 6px;border:1px solid;}
.ptchip{font-size:12px;font-weight:800;padding:3px 9px;border-radius:20px;}
.savebar{position:sticky;bottom:14px;margin-top:18px;display:none;justify-content:center;z-index:15;}
.savebar.show{display:flex;}
.savebar .btn{box-shadow:0 8px 30px rgba(53,226,124,.35);padding:13px 26px;}
.lbrow{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;
  border:1px solid var(--line);background:var(--panel);}
.lbrow.me{border-color:rgba(53,226,124,.4);background:rgba(53,226,124,.07);}
.rank{width:28px;text-align:center;font-size:20px;}
.champ{text-align:center;padding:18px 16px;margin-bottom:16px;border-radius:16px;
  border:1px solid rgba(245,197,66,.4);background:rgba(245,197,66,.08);}
.crest{display:block;margin:0 auto;flex-shrink:0;}
.center{min-height:60vh;display:grid;place-items:center;padding:24px;}
.spin{width:34px;height:34px;border-radius:50%;border:3px solid var(--line);border-top-color:var(--green);animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes up{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.up{animation:up .5s cubic-bezier(.2,.7,.3,1) both;}
.tagrow{display:flex;flex-wrap:wrap;gap:8px;}
.tag{font-size:13px;padding:5px 10px;border-radius:20px;background:var(--panel);border:1px solid var(--line);}
.muted{color:var(--muted);}
.link{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;}
code{background:rgba(255,255,255,.08);padding:1px 6px;border-radius:6px;font-family:'Space Mono',monospace;font-size:12px;}
</style>
</head>
<body>
<div class="lines"></div>
<div class="wrap"><div id="app"></div></div>

<script>

var ME_KEY = "apmsco_me";

/* ===================== helpers ===================== */
function sign(n){ return n>0?1:n<0?-1:0; }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){
  return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]; }); }
function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
function lsDel(k){ try{ localStorage.removeItem(k); }catch(e){} }
function normEmail(e){ return String(e||"").normalize("NFKC").replace(/[\u0000-\u001F\u007F-\u009F\u00AD\u061C\u200B-\u200F\u202A-\u202E\u2060-\u2064\u2066-\u2069\uFEFF]/g,"").replace(/\s+/g,"").toLowerCase(); }

function scorePrediction(pred, actual, cfg){
  if(!actual || actual.home==null || actual.away==null) return null;
  if(!pred || pred.home==null || pred.away==null) return {pts:0,exact:false};
  if(pred.home===actual.home && pred.away===actual.away) return {pts:cfg.exact,exact:true};
  var ok = sign(pred.home-pred.away)===sign(actual.home-actual.away);
  return {pts: ok?cfg.result:0, exact:false};
}

/* ===================== knockout + bonus logic ===================== */
var KO_MULT = {"Round of 32":1,"Round of 16":2,"Quarter-final":2,"Quarter-finals":2,"Semi-final":2,"Semi-finals":2,"Third place":2,"Third-place":2,"Final":3};
var ADV_PTS=2, SHOOT_PTS=1, CHAMP_PTS=10, FINALIST_PTS=3;
function koMult(stage){ return KO_MULT[stage]||0; }
function isKnockout(m){ return koMult(m && m.stage)>0; }
function findMatch(id){ for(var i=0;i<state.matches.length;i++) if(state.matches[i].id===id) return state.matches[i]; return null; }

function scoreMatchFull(pred, m, c){
  var res=(m.result_home!=null && m.result_away!=null)?{home:m.result_home,away:m.result_away}:null;
  if(!res) return null;
  var base=scorePrediction(pred,res,c);
  var scorePts=base.pts, exact=base.exact;
  var mult=koMult(m.stage), ko=mult>0; if(!ko) mult=1;
  var advPts=0, shootPts=0, advOk=false, shoot=false;
  if(ko){
    if(m.advanced && pred && pred.advance && pred.advance===m.advanced){ advPts=ADV_PTS; advOk=true; }
    if(m.beyond90 && pred && pred.home!=null && pred.away!=null && pred.home===pred.away){ shootPts=SHOOT_PTS; shoot=true; }
  }
  var raw=scorePts+advPts+shootPts;
  return {pts:raw*mult, raw:raw, mult:mult, exact:exact, advOk:advOk, shoot:shoot, scorePts:scorePts, advPts:advPts, shootPts:shootPts, ko:ko};
}
function bonusFor(playerId){
  var bp=state.bonus[playerId], s=state.settings||{};
  if(!bp) return {pts:0,champ:false,fin:0};
  var pts=0, champ=false, fin=0;
  if(s.champion && bp.champion && bp.champion===s.champion){ pts+=CHAMP_PTS; champ=true; }
  var actual=[]; if(s.finalist_a) actual.push(s.finalist_a); if(s.finalist_b) actual.push(s.finalist_b);
  var picks=[]; if(bp.finalist1) picks.push(bp.finalist1); if(bp.finalist2 && bp.finalist2!==bp.finalist1) picks.push(bp.finalist2);
  picks.forEach(function(t){ if(actual.indexOf(t)>=0){ pts+=FINALIST_PTS; fin++; } });
  return {pts:pts,champ:champ,fin:fin};
}
function knockoutTeams(){ var set={}; state.matches.forEach(function(m){ if(isKnockout(m)){ if(m.home)set[m.home]=1; if(m.away)set[m.away]=1; } }); return Object.keys(set).sort(); }
function bonusLockTime(){ var t=null; state.matches.forEach(function(m){ if(/round of 16/i.test(m.stage||"") && m.kickoff){ var k=new Date(m.kickoff).getTime(); if(t==null||k<t)t=k; } }); return t; }
function bonusLocked(){ var t=bonusLockTime(); return t!=null && Date.now()>=t; }
function myBonus(){ return (state.me && state.bonus[state.me]) || null; }

function advBtn(m, side, sel){
  var team=side==="home"?m.home:m.away, on=sel===side;
  return '<button class="advbtn" data-act="adv" data-mid="'+m.id+'" data-side="'+side+'" data-team="'+esc(team)+'" style="flex:1;padding:13px 8px;border-radius:10px;cursor:pointer;font-weight:700;font-size:14px;font-family:inherit;'+
    'border:2px solid '+(on?'var(--green)':'var(--line)')+';background:'+(on?'rgba(53,226,124,.16)':'transparent')+';color:'+(on?'var(--green)':'var(--text)')+'">'+(on?'✓ ':'')+esc(team)+'</button>';
}
function orgAdvBtn(m, side){
  var sel=(m.id in state.orgAdv)?state.orgAdv[m.id]:(m.advanced||null), on=sel===side, team=side==="home"?m.home:m.away;
  return '<button class="oadv" data-act="org-adv" data-mid="'+m.id+'" data-side="'+side+'" style="padding:5px 9px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;'+
    'border:1px solid '+(on?'var(--green)':'var(--line)')+';background:'+(on?'rgba(53,226,124,.14)':'transparent')+';color:'+(on?'var(--green)':'var(--text)')+'">'+esc(team)+'</button>';
}
function teamOpts(teams, sel){ return '<option value="">—</option>'+teams.map(function(t){ return '<option value="'+esc(t)+'"'+(sel===t?' selected':'')+'>'+esc(t)+'</option>'; }).join(''); }

function bonusCard(){
  var teams=knockoutTeams(); if(teams.length===0) return "";
  var locked=bonusLocked(), s=state.settings||{}, mb=myBonus();
  var head='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span class="disp" style="font-size:16px">Tournament bonus</span>'+
    '<span class="chip" style="color:'+(locked?'var(--coral)':'var(--gold)')+';border-color:'+(locked?'var(--coral)':'var(--gold)')+'55">'+(locked?'LOCKED':'OPEN')+'</span></div>';
  if(locked){
    var champSet=s.champion?[s.champion]:null;
    var finSet=[]; if(s.finalist_a)finSet.push(s.finalist_a); if(s.finalist_b)finSet.push(s.finalist_b); if(!finSet.length)finSet=null;
    var line=function(label,val,setArr){ var ok=val&&setArr&&setArr.indexOf(val)>=0;
      return '<div style="display:flex;justify-content:space-between;font-size:13px;padding:3px 0"><span class="muted">'+label+'</span><span style="color:'+(val?(setArr?(ok?'var(--green)':'var(--coral)'):'var(--text)'):'var(--muted)')+'">'+(val?esc(val):'—')+(ok?' ✓':'')+'</span></div>'; };
    var body=mb?(line('Champion (+'+CHAMP_PTS+')',mb.champion,champSet)+line('Finalist (+'+FINALIST_PTS+')',mb.finalist1,finSet)+line('Finalist (+'+FINALIST_PTS+')',mb.finalist2,finSet))
      :'<div class="muted" style="font-size:13px">You didn\'t make bonus picks before the lock.</div>';
    return '<div class="card" style="border-color:rgba(245,197,66,.3)">'+head+body+'</div>';
  }
  var bp=mb||{champion:"",finalist1:"",finalist2:""}, lockT=bonusLockTime();
  return '<div class="card" style="border-color:rgba(245,197,66,.3)">'+head+
    '<p class="muted" style="font-size:12px;margin:0 0 10px;line-height:1.5">Pick the winner and your two finalists. Champion +'+CHAMP_PTS+', each finalist who reaches the final +'+FINALIST_PTS+'. Locks at the Round of 16 kickoff'+(lockT?' · '+fmtDate(new Date(lockT).toISOString()):'')+'.</p>'+
    field("Champion 🏆", '<select id="bn-champ" class="in">'+teamOpts(teams,bp.champion||"")+'</select>')+
    '<div class="grid2">'+field("Finalist 1", '<select id="bn-f1" class="in">'+teamOpts(teams,bp.finalist1||"")+'</select>')+
      field("Finalist 2", '<select id="bn-f2" class="in">'+teamOpts(teams,bp.finalist2||"")+'</select>')+'</div>'+
    '<div id="bn-err" style="color:var(--coral);font-size:12px;text-align:center;margin-bottom:6px"></div>'+
    '<button class="btn btn-primary" data-act="save-bonus" style="width:100%">Save bonus picks</button></div>';
}

function fmtDate(iso){ if(!iso) return "TBD"; var d=new Date(iso); if(isNaN(d)) return "TBD";
  return d.toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"})+
    " · "+d.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit"}); }
function fmtTime(iso){ if(!iso) return ""; var d=new Date(iso); if(isNaN(d)) return "";
  return d.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit"}); }
function toLocalInput(iso){ if(!iso) return ""; var d=new Date(iso); if(isNaN(d)) return "";
  var p=function(n){return (n<10?"0":"")+n;};
  return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+"T"+p(d.getHours())+":"+p(d.getMinutes()); }
function kickToIso(v){ if(!v) return null; var d=new Date(v); return isNaN(d)?null:d.toISOString(); }
function isLocked(m){ return (state.results[m.id]) || (m.kickoff && Date.now()>=new Date(m.kickoff).getTime()); }

function crest(size){ size=size||40; var w=Math.round(size*2);
  var n=7, cx=10, cy=15, R=5.2, r=2.4, p=[];
  for(var i=0;i<2*n;i++){ var rad=(i%2===0)?R:r; var a=-Math.PI/2 + i*Math.PI/n;
    p.push((cx+rad*Math.cos(a)).toFixed(2)+','+(cy+rad*Math.sin(a)).toFixed(2)); }
  return '<svg class="crest" xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+size+'" viewBox="0 0 60 30">'+
    '<rect x="0" y="0" width="60" height="10" fill="#000"/>'+
    '<rect x="0" y="10" width="60" height="10" fill="#fff"/>'+
    '<rect x="0" y="20" width="60" height="10" fill="#007a3d"/>'+
    '<polygon points="0,0 30,15 0,30" fill="#ce1126"/>'+
    '<polygon points="'+p.join(' ')+'" fill="#fff"/>'+
    '<rect x="0.4" y="0.4" width="59.2" height="29.2" fill="none" stroke="rgba(255,255,255,.22)" stroke-width="0.8"/></svg>'; }

function toast(msg){
  var t=document.getElementById("toast");
  if(!t){ t=document.createElement("div"); t.id="toast";
    t.style.cssText="position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#0b2017;border:1px solid var(--coral);color:#fff;padding:10px 16px;border-radius:10px;z-index:50;font-size:13px;max-width:90%;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.4)";
    document.body.appendChild(t); }
  t.textContent=msg; t.style.display="block";
  clearTimeout(t._h); t._h=setTimeout(function(){ t.style.display="none"; }, 4500);
}

/* ===================== state ===================== */
var state = {
  loading:true, connError:"", settings:null, players:[], matches:[], results:{}, allPreds:{}, bonus:{},
  me:null, tab:"predict", orgUnlocked:false, showBulk:false, pinErr:"", editing:null,
  advDraft:{}, orgAdv:{}, orgShowAll:false
};
function cfg(){ return state.settings ? {exact:state.settings.exact!=null?state.settings.exact:3, result:state.settings.result!=null?state.settings.result:1} : {exact:3,result:1}; }
function myPlayer(){ for(var i=0;i<state.players.length;i++) if(state.players[i].id===state.me) return state.players[i]; return null; }
function myPreds(){ return (state.me && state.allPreds[state.me]) || {}; }

/* ===================== data (Supabase) ===================== */
async function fetchAllPreds(){
  var all=[], from=0, size=1000;
  for(;;){
    var r=await sb.from("predictions").select("*")
      .order("player_id",{ascending:true}).order("match_id",{ascending:true})
      .range(from, from+size-1);
    if(r.error) throw r.error;
    var rows=r.data||[];
    all=all.concat(rows);
    if(rows.length<size) break;
    from+=size;
  }
  return all;
}
async function loadAll(){
  try{
    var s  = await sb.from("settings").select("*").eq("id",1).maybeSingle();
    if(s.error) throw s.error;
    var pl = await sb.from("players").select("*").order("created_at",{ascending:true});
    if(pl.error) throw pl.error;
    var ms = await sb.from("matches").select("*");
    if(ms.error) throw ms.error;
    var prData = await fetchAllPreds();

    state.settings = s.data ? {poolName:s.data.pool_name, exact:s.data.exact_pts, result:s.data.result_pts, pin:s.data.pin, champion:s.data.champion||null, finalist_a:s.data.finalist_a||null, finalist_b:s.data.finalist_b||null} : null;
    state.players  = (pl.data||[]).map(function(p){ return {id:p.id,name:p.name,email:p.email}; });
    var matches=(ms.data||[]).map(function(m){ return {id:m.id,home:m.home,away:m.away,stage:m.stage,kickoff:m.kickoff,result_home:m.result_home,result_away:m.result_away,advanced:m.advanced!=null?m.advanced:null,beyond90:!!m.beyond90,final_note:m.final_note||null}; });
    matches.sort(function(a,b){ return new Date(a.kickoff||0)-new Date(b.kickoff||0); });
    state.matches=matches;
    var results={}; matches.forEach(function(m){ if(m.result_home!=null && m.result_away!=null) results[m.id]={home:m.result_home,away:m.result_away}; });
    state.results=results;
    var ap={}; prData.forEach(function(x){ (ap[x.player_id]=ap[x.player_id]||{})[x.match_id]={home:x.home,away:x.away,advance:x.advance!=null?x.advance:null}; });
    state.allPreds=ap;
    var bonus={};
    try{ var bq=await sb.from("bonus_picks").select("*"); if(!bq.error && bq.data){ bq.data.forEach(function(b){ bonus[b.player_id]={champion:b.champion,finalist1:b.finalist1,finalist2:b.finalist2}; }); } }catch(e){}
    state.bonus=bonus;
    state.me = lsGet(ME_KEY) || null;
    state.connError=""; state.loading=false;
  }catch(e){
    state.connError = (e && e.message) ? e.message : "Could not reach the database.";
    state.loading=false;
  }
}

function leaderboard(){
  var c=cfg();
  var rows = state.players.map(function(p){
    var pts=0,exacts=0,played=0,hits=0;
    for(var i=0;i<state.matches.length;i++){
      var m=state.matches[i];
      var sc=scoreMatchFull(state.allPreds[p.id]&&state.allPreds[p.id][m.id], m, c);
      if(sc!==null){ played++; pts+=sc.pts; if(sc.exact) exacts++; if(sc.pts>0) hits++; }
    }
    var b=bonusFor(p.id); pts+=b.pts;
    return {id:p.id,name:p.name,email:p.email,pts:pts,exacts:exacts,played:played,hits:hits,bonus:b.pts};
  });
  rows.sort(function(a,b){ return b.pts-a.pts || b.exacts-a.exacts || b.hits-a.hits || a.name.localeCompare(b.name); });
  return rows;
}

/* ===================== render ===================== */
function render(){
  var el=document.getElementById("app");
  if(state.loading){ el.innerHTML='<div class="center"><div style="display:grid;gap:14px;justify-items:center"><div class="spin"></div><span class="muted" style="font-size:14px">Loading the pool…</span></div></div>'; return; }

function viewPast(){
  if(state.matches.length===0) return empty("No fixtures yet","The organizer hasn\'t added any matches yet.");

  var list=state.matches.filter(function(m){ return isLocked(m); })
    .slice().sort(function(a,b){ return new Date(b.kickoff||0)-new Date(a.kickoff||0); });
  if(list.length===0) return empty("No results yet","Matches show up here once they kick off — with scores, your pick and points. Until then, make your picks in Predict.");
  var groups={}, order=[];
  list.forEach(function(m){
    var key=m.kickoff?new Date(m.kickoff).toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric"}):"Date TBD";
    if(!groups[key]){ groups[key]=[]; order.push(key); }
    groups[key].push(m); });
  var html='<div class="up"><div style="display:flex;justify-content:space-between;align-items:center;margin:14px 2px 6px">'+
    '<h2 class="disp sect" style="margin:0">Results</h2><button class="btn btn-ghost" data-act="refresh" style="font-size:12px;padding:6px 10px">↻ Refresh</button></div>';

function matchCard(m, mine, c){
  var locked=isLocked(m); var final=(m.result_home!=null&&m.result_away!=null);
  var ko=isKnockout(m); var mult=koMult(m.stage);
  var pred=mine[m.id];
  var sc = final ? scoreMatchFull(pred, m, c) : null;
  var status = final?{t:"FINAL",col:"var(--muted)"}:locked?{t:"LOCKED",col:"var(--coral)"}:{t:"OPEN",col:"var(--green)"};
  var scoreArea;
  if(locked){
    scoreArea='<div class="mono" style="display:flex;align-items:center;gap:8px;font-size:20px">'+
      '<span class="pill">'+(pred?pred.home:"–")+'</span><span class="muted">:</span><span class="pill">'+(pred?pred.away:"–")+'</span></div>';
  } else {
    scoreArea='<div style="display:flex;align-items:center;gap:8px">'+
      scoreIn(m.id,"home",pred?pred.home:"")+'<span class="muted" style="font-weight:700">:</span>'+scoreIn(m.id,"away",pred?pred.away:"")+'</div>';
  }
  var html='<div class="card" style="'+(final&&sc&&sc.pts>0?'border-color:rgba(53,226,124,.35)':'')+'">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
    '<span class="muted" style="font-size:11px;letter-spacing:.5px">'+esc(m.stage||"Match")+(m.kickoff?' · '+fmtTime(m.kickoff):'')+(ko&&mult>1?' · ×'+mult:'')+'</span>'+
    '<span class="chip" style="color:'+status.col+';border-color:'+status.col+'55">'+status.t+'</span></div>'+
    '<div class="matchrow"><div class="team" style="text-align:right">'+esc(m.home)+'</div>'+scoreArea+'<div class="team" style="text-align:left">'+esc(m.away)+'</div></div>';
  if(ko){
    var advSel = (m.id in state.advDraft)? state.advDraft[m.id] : (pred&&pred.advance)||null;
    if(!locked){
      html+='<div style="font-size:12px;text-align:center;margin-top:9px;color:var(--muted)">↑ Predict the score at <b style="color:var(--text)">90 minutes</b></div>'+
        '<div id="advbox-'+m.id+'" style="margin-top:10px;padding:11px 10px 12px;border:1.5px solid '+(advSel?'rgba(245,197,66,.45)':'var(--coral)')+';border-radius:12px;background:'+(advSel?'rgba(245,197,66,.07)':'rgba(255,94,82,.07)')+'">'+
        '<div style="font-size:15px;font-weight:800;text-align:center;margin-bottom:2px">Who goes through? <span style="color:var(--gold)">+2 pts</span></div>'+
        '<div style="font-size:11px;text-align:center;color:var(--muted);margin-bottom:9px">Tap the team you think advances (even if you predicted a draw)</div>'+
        '<div style="display:flex;gap:8px">'+advBtn(m,"home",advSel)+advBtn(m,"away",advSel)+'</div>'+
        '<div id="advnudge-'+m.id+'" style="font-size:12px;text-align:center;margin-top:8px;color:var(--coral);font-weight:600;'+(advSel?'display:none':'')+'">⚠ No pick yet — you\'ll miss +2 points</div>'+
        '</div>';
    } else {
      var myAdv = pred&&pred.advance?(pred.advance==="home"?m.home:m.away):null;
      var wentThru = final&&m.advanced?(m.advanced==="home"?m.home:m.away):null;
      html+='<div class="muted" style="text-align:center;margin-top:8px;font-size:12px">Your pick to advance: <b style="color:'+(sc&&sc.advOk?'var(--green)':'var(--text)')+'">'+(myAdv?esc(myAdv):'—')+'</b>'+
        (wentThru?' · advanced: <b style="color:var(--text)">'+esc(wentThru)+'</b>':'')+(final&&m.beyond90?' <span style="color:var(--gold)">(ET/pens)</span>':'')+'</div>';
    }
  }
  if(final){
    html+='<div style="margin-top:10px;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap">'+
      '<span class="mono muted" style="font-size:13px">'+(ko?'90\' ':'Result ')+'<b style="color:var(--text)">'+m.result_home+'–'+m.result_away+'</b></span>'+
      (pred?'<span class="mono muted" style="font-size:13px">You said '+pred.home+'–'+pred.away+'</span>':'<span class="muted" style="font-size:13px">No prediction</span>');
    if(sc){
      var bg=sc.exact?'rgba(245,197,66,.16)':sc.pts>0?'rgba(53,226,124,.16)':'rgba(255,94,82,.12)';
      var col=sc.exact?'var(--gold)':sc.pts>0?'var(--green)':'var(--coral)';
      html+='<span class="ptchip" style="background:'+bg+';color:'+col+'">'+(sc.exact?'EXACT · ':'')+'+'+sc.pts+' pts</span>';
    }
    html+='</div>';
    if(ko && m.final_note){ html+='<div class="muted mono" style="text-align:center;font-size:12px;margin-top:3px">Final: '+esc(m.final_note)+'</div>'; }
    if(sc && ko && sc.pts>0){
      var bd=[]; bd.push((sc.exact?'exact ':'score ')+sc.scorePts); if(sc.advPts) bd.push('adv '+sc.advPts); if(sc.shootPts) bd.push('SO '+sc.shootPts);
      var bdt=bd.join(' + '); if(sc.mult>1) bdt='('+bdt+') ×'+sc.mult;
      html+='<div class="muted mono" style="text-align:center;font-size:11px;margin-top:4px">'+bdt+'</div>';
    }
  }
  if(locked){
    html+='<button class="link" data-act="toggle-picks" data-id="'+m.id+'" style="margin-top:10px;width:100%">'+
      (state["open_"+m.id]?'▲ Hide everyone\'s picks':'▼ Show everyone\'s picks')+'</button>';
    if(state["open_"+m.id]){
      html+='<div style="margin-top:8px;border-top:1px solid var(--line);padding-top:8px;display:grid;gap:6px">';
      state.players.forEach(function(p){
        var pr=state.allPreds[p.id]&&state.allPreds[p.id][m.id];
        var psc=scoreMatchFull(pr,m,c);
        var pcol=psc?(psc.exact?'var(--gold)':psc.pts>0?'var(--green)':'var(--muted)'):'var(--muted)';
        var advMark = (ko&&pr&&pr.advance)?'<span style="color:'+(psc&&psc.advOk?'var(--green)':'var(--muted)')+';font-size:11px;margin-left:6px">'+esc(pr.advance==="home"?m.home:m.away)+(psc&&psc.advOk?' ✓':'')+'</span>':'';
        html+='<div style="display:flex;justify-content:space-between;font-size:13px;align-items:center"><span>'+esc(p.name)+advMark+'</span>'+
          '<span class="mono" style="color:'+(pr?'var(--text)':'var(--muted)')+'">'+(pr?pr.home+'–'+pr.away:'—')+
          (psc?'<span style="color:'+pcol+';margin-left:8px">+'+psc.pts+'</span>':'')+'</span></div>';
      });
      html+='</div>';
    }
  }
  html+='</div>';
  return html;
}
function scoreIn(mid, side, val){

        '<span class="muted">:</span>'+

        '<div style="flex:1;font-weight:700;font-size:14px">'+esc(m.away)+'</div></div>';
      if(isKnockout(m)){
        html+='<div class="muted" style="font-size:10px;text-align:center;margin-top:6px">Enter the score at 90 min above (this is what predictions score against).</div>'+
          '<div style="margin-top:6px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center">'+
          '<span class="muted" style="font-size:11px">Advanced:</span>'+orgAdvBtn(m,"home")+orgAdvBtn(m,"away")+
          '<label style="font-size:12px;display:flex;align-items:center;gap:5px;margin-left:6px;cursor:pointer"><input type="checkbox" class="b90" data-mid="'+m.id+'"'+(m.beyond90?' checked':'')+'> ET/pens</label></div>'+
          '<input class="in finalnote" data-mid="'+m.id+'" value="'+esc(m.final_note||"")+'" placeholder="Final after ET/pens (optional), e.g. 1-1 (4-2 pens)" style="margin-top:8px;font-size:12px;padding:8px 10px">';
      }
      html+='<div style="display:flex;gap:8px;margin-top:8px;justify-content:flex-end">'+
        '<button class="btn btn-ghost" data-act="edit-match" data-id="'+m.id+'" style="font-size:12px;padding:6px 10px">Edit</button>'+
        (result?'<button class="btn btn-ghost" data-act="clear-result" data-id="'+m.id+'" style="font-size:12px;padding:6px 10px">Clear</button>':'')+
        '<button class="btn btn-danger" data-act="delete-match" data-id="'+m.id+'" style="font-size:12px;padding:6px 10px">Delete</button>'+
        '<button class="btn btn-primary" data-act="set-result" data-id="'+m.id+'" style="font-size:12px;padding:6px 14px">'+(result?'Update':'Save result')+'</button></div></div>';
    });
  }

  html+='<h2 class="disp sect">Pool settings</h2>'+
    '<div class="card" style="padding:14px;margin-bottom:18px">'+
    field("Pool name", '<input class="in setin" data-field="poolName" value="'+esc(s.poolName)+'">')+
    '<div class="grid2">'+field("Pts · exact", '<input class="in setin" data-field="exact" inputmode="numeric" value="'+c.exact+'" style="text-align:center">')+
      field("Pts · result", '<input class="in setin" data-field="result" inputmode="numeric" value="'+c.result+'" style="text-align:center">')+'</div></div>';
  html+='<h2 class="disp sect" style="margin-top:0">Add a fixture</h2>'+
    '<p class="muted" style="font-size:12px;margin:0 2px 8px;line-height:1.5">Add matches anytime. Load the group stage now, then add each knockout round once the bracket is decided. Players can predict any match right up until its kickoff.</p>'+
    '<div class="card" style="padding:14px">'+
    '<div class="grid2">'+field("Home team", '<input id="m-home" class="in" list="teams" placeholder="Team">')+
      field("Away team", '<input id="m-away" class="in" list="teams" placeholder="Team">')+'</div>'+
    '<div class="grid2">'+field("Stage / group", '<input id="m-stage" class="in" list="stages" value="Group stage">')+
      field("Kickoff (local)", '<input id="m-kick" class="in" type="datetime-local">')+'</div>'+
    '<div style="display:flex;gap:8px"><button class="btn btn-primary" data-act="add-match" style="flex:1">Add fixture</button>'+
      '<button class="btn btn-ghost" data-act="bulk-toggle">Paste many</button></div>';
  if(state.showBulk){
    html+='<div style="margin-top:12px"><textarea id="m-bulk" class="in" rows="6" placeholder="One per line:&#10;Mexico, South Africa, 2026-06-11 18:00, Group A&#10;USA vs Paraguay, 2026-06-12 18:00"></textarea>'+
      '<button class="btn btn-primary" data-act="bulk-import" style="width:100%;margin-top:8px">Import</button></div>';
  }
  if(state.matches.length===0){
    html+='<button class="btn btn-ghost" data-act="seed" style="width:100%;margin-top:8px;font-size:13px">+ Seed the two confirmed opening fixtures (verify kickoff times)</button>';
  }
  html+='</div>';
  if(knockoutTeams().length>0){
    var kt=knockoutTeams();
    html+='<h2 class="disp sect">Tournament outcome</h2>'+
      '<p class="muted" style="font-size:12px;margin:0 2px 8px;line-height:1.5">Set these once known, to score the champion &amp; finalist bonus. Knockout multipliers: R16 / QF / SF / 3rd ×2, Final ×3.</p>'+
      '<div class="card" style="padding:14px">'+
      field("Champion 🏆", '<select id="oc-champ" class="in">'+teamOpts(kt, s.champion||"")+'</select>')+
      '<div class="grid2">'+field("Finalist A", '<select id="oc-fa" class="in">'+teamOpts(kt, s.finalist_a||"")+'</select>')+
        field("Finalist B", '<select id="oc-fb" class="in">'+teamOpts(kt, s.finalist_b||"")+'</select>')+'</div>'+
      '<button class="btn btn-primary" data-act="set-outcome" style="width:100%">Save outcome</button></div>';
  }
  if(state.players.length>0){
    html+='<h2 class="disp sect">Players</h2><div class="card" style="padding:6px 14px">';
    state.players.forEach(function(p){
      html+='<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px">'+
        '<span>'+esc(p.name)+'</span><span class="muted">'+(p.email?esc(p.email):'—')+'</span></div>';
    });
    html+='</div>';
  }
  html+='<datalist id="stages">'+["Group stage","Group A","Group B","Group C","Group D","Group E","Group F","Group G","Group H","Group I","Group J","Group K","Group L","Round of 32","Round of 16","Quarter-final","Semi-final","Third place","Final"].map(function(x){return '<option value="'+x+'">';}).join('')+'</datalist>';
  html+='<datalist id="teams">'+["Mexico","Canada","USA","Argentina","Spain","France","England","Brazil","Portugal","Germany","Netherlands","Italy","Croatia","Colombia","Uruguay","Japan","South Korea","Morocco","Senegal","South Africa","Paraguay","Australia","Türkiye","Uzbekistan","Jordan","Cape Verde","Curaçao","DR Congo"].map(function(t){return '<option value="'+t+'">';}).join('')+'</datalist>';
  html+='</div>';
  return html;
}

function field(label, control, hint){
  return '<label class="field"><div class="lbl">'+label+'</div>'+control+(hint?'<div class="hint">'+hint+'</div>':'')+'</label>';
}
function empty(title, body){
  return '<div class="up muted" style="text-align:center;padding:50px 24px">'+crest(52)+
    '<div class="disp" style="font-size:22px;margin-top:14px">'+title+'</div>'+
    '<p class="muted" style="max-width:360px;margin:8px auto 0;line-height:1.6">'+body+'</p></div>';
}

/* ===================== dirty / save bar ===================== */
function readDraft(){
  var map={}; document.querySelectorAll(".predin").forEach(function(inp){
    var mid=inp.dataset.mid, side=inp.dataset.side; map[mid]=map[mid]||{};
    map[mid][side]= inp.value===""?null:Math.max(0,Math.min(99,parseInt(inp.value,10)));
  }); return map;
}
function isDirty(){
  var d=readDraft(), saved=myPreds();
  for(var mid in d){ var s=saved[mid]; var sh=s?s.home:null, sa=s?s.away:null;
    if(d[mid].home!==sh || d[mid].away!==sa) return true; }
  for(var mid2 in state.advDraft){ var sv=saved[mid2]; var savedAdv=sv&&sv.advance!=null?sv.advance:null;
    if(state.advDraft[mid2]!==savedAdv) return true; }
  return false;
}
function updateSaveBar(){ var bar=document.getElementById("savebar"); if(bar) bar.classList.toggle("show", isDirty()); }

/* ===================== events ===================== */
function onClick(e){
  var t=e.target.closest("[data-act]"); if(!t) return;
  var act=t.dataset.act, id=t.dataset.id;
  if(act==="tab"){ state.tab=t.dataset.tab; render(); return; }
  if(act==="switch"){ doSwitch(); return; }
  if(act==="refresh"){ state.loading=true; render(); loadAll().then(render); return; }
  if(act==="setup-create"){ doSetup(); return; }
  if(act==="join"){ doJoin(); return; }
  if(act==="save-preds"){ doSavePreds(); return; }
  if(act==="adv"){ var am=t.dataset.mid, as=t.dataset.side; state.advDraft[am]=as;
    document.querySelectorAll('.advbtn[data-mid="'+am+'"]').forEach(function(b){ var on=b.dataset.side===as;
      b.style.borderColor=on?'var(--green)':'var(--line)'; b.style.background=on?'rgba(53,226,124,.16)':'transparent'; b.style.color=on?'var(--green)':'var(--text)';
      b.textContent=(on?'✓ ':'')+b.dataset.team; });
    var abox=document.getElementById('advbox-'+am); if(abox){ abox.style.borderColor='rgba(245,197,66,.45)'; abox.style.background='rgba(245,197,66,.07)'; }
    var anud=document.getElementById('advnudge-'+am); if(anud){ anud.style.display='none'; }
    updateSaveBar(); return; }
  if(act==="org-adv"){ var om=t.dataset.mid, os=t.dataset.side; state.orgAdv[om]=os;
    document.querySelectorAll('.oadv[data-mid="'+om+'"]').forEach(function(b){ var on=b.dataset.side===os;
      b.style.borderColor=on?'var(--green)':'var(--line)'; b.style.background=on?'rgba(53,226,124,.14)':'transparent'; b.style.color=on?'var(--green)':'var(--text)'; });
    return; }
  if(act==="save-bonus"){ doSaveBonus(); return; }
  if(act==="org-need"){ state.orgShowAll=false; render(); return; }
  if(act==="org-all"){ state.orgShowAll=true; render(); return; }
  if(act==="set-outcome"){ doSetOutcome(); return; }
  if(act==="toggle-picks"){ state["open_"+id]=!state["open_"+id]; render(); return; }
  if(act==="org-unlock"){ doUnlock(); return; }
  if(act==="set-pin"){ doSetPin(); return; }
  if(act==="bulk-toggle"){ state.showBulk=!state.showBulk; render(); return; }
  if(act==="bulk-import"){ doBulk(); return; }
  if(act==="add-match"){ doAddMatch(); return; }
  if(act==="seed"){ doSeed(); return; }
  if(act==="set-result"){ doSetResult(id); return; }
  if(act==="edit-match"){ state.editing=id; render(); return; }
  if(act==="cancel-edit"){ state.editing=null; render(); return; }
  if(act==="save-edit"){ doSaveEdit(id); return; }
  if(act==="clear-result"){ doClearResult(id); return; }
  if(act==="delete-match"){ doDeleteMatch(id); return; }
}
function onInput(e){
  var el=e.target;
  if(el.classList.contains("predin")||el.classList.contains("resin")){ el.value=el.value.replace(/\D/g,"").slice(0,2); el.classList.toggle("filled", el.value!==""); }
  if(el.classList.contains("pinin")){ el.value=el.value.replace(/\D/g,"").slice(0,6); }
  if(el.classList.contains("predin")) updateSaveBar();
}
function onChange(e){
  var el=e.target;
  if(el.classList.contains("setin")){
    var f=el.dataset.field, patch={}, dbpatch={};
    if(f==="poolName"){ patch.poolName=el.value; dbpatch.pool_name=el.value; }
    else if(f==="exact"){ patch.exact=parseInt(el.value||"0",10); dbpatch.exact_pts=patch.exact; }
    else if(f==="result"){ patch.result=parseInt(el.value||"0",10); dbpatch.result_pts=patch.result; }
    state.settings=Object.assign({}, state.settings, patch);
    sb.from("settings").update(dbpatch).eq("id",1).then(function(r){ if(r.error) toast("Save failed: "+r.error.message); });
  }
}

/* ===================== mutations ===================== */
async function doSetup(){
  var name=(document.getElementById("su-name").value||"").trim();
  var pin=(document.getElementById("su-pin").value||"");
  var err=document.getElementById("su-err");
  if(!name){ if(err) err.textContent="Please enter a pool name."; return; }
  if(pin.length<4){ if(err) err.textContent="Choose an organizer PIN of at least 4 digits — this keeps control of the pool with you."; return; }
  var row={ id:1, pool_name:name,
    exact_pts:parseInt(document.getElementById("su-exact").value||"3",10),
    result_pts:parseInt(document.getElementById("su-result").value||"1",10), pin:pin };
  try{ var r=await sb.from("settings").upsert(row,{onConflict:"id"}); if(r.error) throw r.error; }
  catch(e){ if(err) err.textContent=e.message||"Could not save."; return; }
  state.orgUnlocked=true; await loadAll(); render();
}
async function doJoin(){
  var err=document.getElementById("jn-err");
  var name=(document.getElementById("jn-name").value||"").trim();
  if(!name){ if(err) err.textContent="Please enter your name."; document.getElementById("jn-name").focus(); return; }
  var email=(document.getElementById("jn-email").value||"").trim();
  if(!email || !/^\S+@\S+\.\S+$/.test(email)){ if(err) err.textContent="Please enter a valid email — it's how we keep you as one player and avoid duplicates."; document.getElementById("jn-email").focus(); return; }
  if(err) err.textContent="";
  var lc=normEmail(email);
  function findByEmail(list){ if(!lc||!list) return null; for(var i=0;i<list.length;i++){ if(normEmail(list[i].email)===lc) return list[i]; } return null; }
  function adopt(p){ lsSet(ME_KEY, p.id); state.me=p.id; }
  // 1) check the list already in memory
  var hit=findByEmail(state.players);
  if(hit){ adopt(hit); await loadAll(); render(); return; }
  // 2) authoritative re-check against the live database (memory may be stale or not loaded yet)
  if(lc){
    try{ var look=await sb.from("players").select("id,name,email");
      if(!look.error){ hit=findByEmail(look.data); if(hit){ adopt(hit); await loadAll(); render(); return; } } }catch(e){}
  }
  // 3) no existing player with this email -> create one
  try{
    var r=await sb.from("players").insert({name:name, email:email||null}).select();
    if(r.error) throw r.error;
    var id=r.data && r.data[0] && r.data[0].id; if(!id) throw new Error("No id returned");
    lsSet(ME_KEY, id); state.me=id;
  }catch(e){
    // last-ditch: a row may have appeared in a race -> adopt it instead of duplicating
    if(lc){ try{ var again=await sb.from("players").select("id,name,email");
      if(again.data){ hit=findByEmail(again.data); if(hit){ adopt(hit); await loadAll(); render(); return; } } }catch(e2){} }
    toast("Couldn't join: "+(e.message||e)); return;
  }
  await loadAll(); render();
}
function doSwitch(){ lsDel(ME_KEY); state.me=null; state.tab="predict"; state.orgUnlocked=false; render(); }
async function doSavePreds(){
  if(!state.me) return;
  var d=readDraft(); var saved=myPreds(); var ups=[], dels=[];
  for(var mid in d){
    if(d[mid].home!=null && d[mid].away!=null){
      var adv = (mid in state.advDraft)? state.advDraft[mid] : (saved[mid]&&saved[mid].advance!=null?saved[mid].advance:null);
      ups.push({player_id:state.me, match_id:mid, home:d[mid].home, away:d[mid].away, advance:adv});
    }
    else if(saved[mid]){ dels.push(mid); }
  }
  try{
    if(ups.length){ var r=await sb.from("predictions").upsert(ups,{onConflict:"player_id,match_id"}); if(r.error) throw r.error; }
    for(var i=0;i<dels.length;i++){ var dr=await sb.from("predictions").delete().eq("player_id",state.me).eq("match_id",dels[i]); if(dr.error) throw dr.error; }
  }catch(e){ toast("Couldn't save: "+(e.message||e)); return; }
  state.advDraft={};
  await loadAll(); render();
}
async function doSaveBonus(){
  if(!state.me) return;
  if(bonusLocked()){ toast("Bonus picks are locked."); return; }
  var champ=(document.getElementById("bn-champ").value||"")||null;
  var f1=(document.getElementById("bn-f1").value||"")||null;
  var f2=(document.getElementById("bn-f2").value||"")||null;
  var err=document.getElementById("bn-err");
  if(f1 && f2 && f1===f2){ if(err) err.textContent="Pick two different finalists."; return; }
  try{ var r=await sb.from("bonus_picks").upsert({player_id:state.me, champion:champ, finalist1:f1, finalist2:f2, updated_at:new Date().toISOString()},{onConflict:"player_id"}); if(r.error) throw r.error; }
  catch(e){ toast("Couldn't save bonus: "+(e.message||e)); return; }
  toast("Bonus picks saved."); await loadAll(); render();
}
async function doSetOutcome(){
  var champ=(document.getElementById("oc-champ").value||"")||null;
  var fa=(document.getElementById("oc-fa").value||"")||null;
  var fb=(document.getElementById("oc-fb").value||"")||null;
  try{ var r=await sb.from("settings").update({champion:champ, finalist_a:fa, finalist_b:fb}).eq("id",1); if(r.error) throw r.error; }
  catch(e){ toast("Couldn't save outcome: "+(e.message||e)); return; }
  toast("Outcome saved."); await loadAll(); render();
}
function doUnlock(){ var v=(document.getElementById("org-pin").value||""); if(v===state.settings.pin){ state.orgUnlocked=true; state.pinErr=""; } else { state.pinErr="Wrong PIN. Try again."; } render(); }
async function doSetPin(){
  var v=(document.getElementById("claim-pin").value||""); var err=document.getElementById("claim-err");
  if(v.length<4){ if(err) err.textContent="Choose a PIN of at least 4 digits."; return; }
  try{ var r=await sb.from("settings").update({pin:v}).eq("id",1); if(r.error) throw r.error; }
  catch(e){ if(err) err.textContent=e.message||"Could not save."; return; }
  state.orgUnlocked=true; await loadAll(); render();
}
async function doAddMatch(){
  var h=(document.getElementById("m-home").value||"").trim(), a=(document.getElementById("m-away").value||"").trim();
  if(!h||!a) return;
  var m={ home:h, away:a, stage:(document.getElementById("m-stage").value||"Group stage").trim(), kickoff:kickToIso(document.getElementById("m-kick").value) };
  try{ var r=await sb.from("matches").insert(m); if(r.error) throw r.error; }
  catch(e){ toast("Couldn't add: "+(e.message||e)); return; }
  await loadAll(); render();
}
async function doBulk(){
  var txt=(document.getElementById("m-bulk").value||""); var lines=txt.split("\n").map(function(l){return l.trim();}).filter(Boolean);
  var rows=[];
  for(var i=0;i<lines.length;i++){
    var parts=lines[i].split(/\s*[,|;]\s*|\s+vs\.?\s+/i).map(function(p){return p.trim();}).filter(Boolean);
    if(parts.length<2) continue;
    var kickoff=null, st="Group stage";
    for(var k=2;k<parts.length;k++){ var d=new Date(parts[k].replace(" ","T")); if(!isNaN(d)) kickoff=d.toISOString(); else st=parts[k]; }
    rows.push({home:parts[0], away:parts[1], stage:st, kickoff:kickoff});
  }
  if(rows.length){ try{ var r=await sb.from("matches").insert(rows); if(r.error) throw r.error; }catch(e){ toast("Import failed: "+(e.message||e)); return; } }
  state.showBulk=false; await loadAll(); render();
}
async function doSeed(){
  var rows=[{home:"Mexico",away:"South Africa",stage:"Group A · Opener",kickoff:new Date("2026-06-11T18:00").toISOString()},
            {home:"USA",away:"Paraguay",stage:"Group D",kickoff:new Date("2026-06-12T18:00").toISOString()}];
  try{ var r=await sb.from("matches").insert(rows); if(r.error) throw r.error; }
  catch(e){ toast("Couldn't seed: "+(e.message||e)); return; }
  await loadAll(); render();
}
async function doSetResult(id){
  var h=document.querySelector('.resin[data-mid="'+id+'"][data-side="home"]').value;
  var a=document.querySelector('.resin[data-mid="'+id+'"][data-side="away"]').value;
  if(h===""||a==="") return;
  var patch={result_home:parseInt(h,10), result_away:parseInt(a,10)};
  var m=findMatch(id);
  if(m && isKnockout(m)){
    patch.advanced = (id in state.orgAdv)? state.orgAdv[id] : (m.advanced||null);
    var cb=document.querySelector('.b90[data-mid="'+id+'"]'); patch.beyond90 = cb? !!cb.checked : !!m.beyond90;
    var fn=document.querySelector('.finalnote[data-mid="'+id+'"]'); patch.final_note = fn?(fn.value.trim()||null):(m.final_note||null);
  }
  try{ var r=await sb.from("matches").update(patch).eq("id",id); if(r.error) throw r.error; }
  catch(e){ toast("Couldn't save result: "+(e.message||e)); return; }
  await loadAll(); render();
}
async function doClearResult(id){
  try{ var r=await sb.from("matches").update({result_home:null, result_away:null, advanced:null, beyond90:false, final_note:null}).eq("id",id); if(r.error) throw r.error; }
  catch(e){ toast("Couldn't clear: "+(e.message||e)); return; }
  state.orgAdv={}; await loadAll(); render();
}
async function doDeleteMatch(id){
  try{ var r=await sb.from("matches").delete().eq("id",id); if(r.error) throw r.error; }
  catch(e){ toast("Couldn't delete: "+(e.message||e)); return; }
  await loadAll(); render();
}
async function doSaveEdit(id){
  var home=(document.getElementById("e-home").value||"").trim();
  var away=(document.getElementById("e-away").value||"").trim();
  if(!home||!away) return;
  var patch={ home:home, away:away, stage:(document.getElementById("e-stage").value||"").trim()||"Match", kickoff:kickToIso(document.getElementById("e-kick").value) };
  try{ var r=await sb.from("matches").update(patch).eq("id",id); if(r.error) throw r.error; }
  catch(e){ toast("Couldn't save match: "+(e.message||e)); return; }
  state.editing=null; await loadAll(); render();
}

/* ===================== auto-refresh ===================== */
async function autoRefresh(){
  try{
    var a=document.activeElement;
    if(a && (a.tagName==="INPUT"||a.tagName==="TEXTAREA")) return;
    if(state.editing || state.showBulk) return;
    if(state.tab==="predict" && isDirty()) return;
    if(!sb || state.loading) return;
    await loadAll(); render();
  }catch(e){}
}

/* ===================== init ===================== */
document.addEventListener("click", onClick);
document.addEventListener("input", onInput);
document.addEventListener("change", onChange);
render();
if(sb){ loadAll().then(render); setInterval(autoRefresh, 25000); }
else { state.loading=false; render(); }
</script>
